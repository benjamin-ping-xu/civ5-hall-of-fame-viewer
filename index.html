<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <title>Civ V Hall of Fame Viewer</title>
  </head>
  <body>
    <h1>Civ V Hall of Fame Viewer</h1>

    <p>Select your local Civilization V Hall of Fame database.</p>

    <button id="selectDatabaseButton">Select HallOfFameDatabase.db</button>

    <p>
      <strong>Selected file:</strong>
      <span id="selectedPath">None</span>
    </p>

    <section id="filterBar">
      <label>
        Victory
        <select id="victoryFilter">
          <option value="">All</option>
        </select>
      </label>

      <label>
        Difficulty
        <select id="difficultyFilter">
          <option value="">All</option>
        </select>
      </label>

      <label>
        Speed
        <select id="speedFilter">
          <option value="">All</option>
        </select>
      </label>

      <label>
        Map Size
        <select id="mapSizeFilter">
          <option value="">All</option>
        </select>
      </label>

      <label>
        Civilization
        <select id="civilizationFilter">
          <option value="">All</option>
        </select>
      </label>

      <label>
        Result
        <select id="resultFilter">
          <option value="">All</option>
        </select>
      </label>

      <label>
        Mode
        <select id="modeFilter">
          <option value="">All</option>
        </select>
      </label>

      <button id="clearFiltersButton">Clear filters</button>
    </section>

    <section id="summaryCards"></section>

    <h2>Victories</h2>
    <div id="victoryTableContainer"></div>

    <script src="renderer.js"></script>
  </body>
</html>
